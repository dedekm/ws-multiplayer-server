<!doctype html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WS control test</title>
        <link rel="stylesheet" href="stylesheets/main.css" />
        <script src="https://unpkg.com/joystick-controller/dist/joystick-controller.umd.js"></script>
        <script src="javascripts/base.js" defer></script>
        <script src="javascripts/joystick.js" defer></script>
    </head>
    <body>
        <div id="join-screen">
            <button id="btn-join" onclick="joinGame()">Connect</button>

            <div id="joystick-area"></div>

            <div id="bottom-bar">
                <button id="btn-ping" onclick="sendPing()">Ping</button>
            </div>
        </div>
    </body>
</html>
