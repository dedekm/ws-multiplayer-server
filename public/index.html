<!doctype html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ship control</title>
        <script src="script.js" defer></script>
        <style>
            body {
                user-select: none;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                touch-action: manipulation;
                overflow-x: hidden;
            }
            button {
                user-select: none;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                touch-action: manipulation;
            }
            html,
            body {
                max-width: 100%;
                overflow-x: hidden;
            }
            .title {
                color: #336699;
                text-align: center;
                margin-bottom: 20px;
                font-family: "Arial", sans-serif;
            }
            .controls {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                margin-top: 30px;
            }
            .horizontal-controls {
                display: flex;
                gap: 10px;
            }
            button {
                width: 60px;
                height: 60px;
                font-size: 24px;
                border-radius: 10px;
                border: none;
                background-color: #4caf50;
                color: white;
                cursor: pointer;
                transition: all 0.3s;
            }
            button:hover {
                background-color: #45a049;
                transform: scale(1.05);
            }
            button:active {
                transform: scale(0.95);
            }
            .long {
                width: 180px;
                height: 60px;
            }
        </style>
    </head>
    <body>
        <!-- <h2 class="title">Control ship with arrow keys</h2> -->
        <!-- <div class="logs"></div> -->
        <div class="controls">
            <p></p>
            <p></p>

            <button
                onmousedown="moveUp()"
                ontouchstart="moveUp()"
                onmouseup="moveUpNot()"
                ontouchend="moveUpNot()"
            >
                ↑
            </button>
            <div class="horizontal-controls">
                <button
                    onmousedown="moveLeft()"
                    ontouchstart="moveLeft()"
                    onmouseup="moveLeftNot()"
                    ontouchend="moveLeftNot()"
                >
                    ←
                </button>
                <button
                    onmousedown="moveDown()"
                    ontouchstart="moveDown()"
                    onmouseup="moveDownNot()"
                    ontouchend="moveDownNot()"
                >
                    ↓
                </button>
                <button
                    onmousedown="moveRight()"
                    ontouchstart="moveRight()"
                    onmouseup="moveRightNot()"
                    ontouchend="moveRightNot()"
                >
                    →
                </button>
            </div>
            <p></p>
            <p></p>
            <p></p>
            <p></p>
            <button
                class="long"
                onmousedown="shoot()"
                ontouchstart="shoot()"
                onmouseup="shoootNot()"
                ontouchend="shoootNot()"
            >
                SHOOT
            </button>
        </div>
    </body>
</html>
